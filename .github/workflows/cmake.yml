
name: CMake Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: List build/bin directory (Linux)
        if: runner.os == 'Linux'
        run: |
          ls -al bin || true
          ls -al build/bin || true

      - name: List build/bin directory (Windows)
        if: runner.os == 'Windows'
        run: |
          dir bin || exit 0
          dir build\bin || exit 0

      - name: Run Timestamp (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x ./bin/Timestamp || chmod +x ./build/bin/Timestamp || true
          if [ -f ./bin/Timestamp ]; then
            ./bin/Timestamp
          elif [ -f ./build/bin/Timestamp ]; then
            ./build/bin/Timestamp
          else
            echo "Timestamp binary not found!" && exit 1
          fi

      - name: Run Timestamp (Windows)
        if: runner.os == 'Windows'
        run: |
          if exist bin\Release\Timestamp.exe (
            bin\Release\Timestamp.exe
          ) else if exist build\bin\Release\Timestamp.exe (
            build\bin\Release\Timestamp.exe
          ) else (
            echo Timestamp.exe not found! && exit 1
          )
